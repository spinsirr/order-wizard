name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        working-directory: .
        run: |
          ROOT_VERSION=$(jq -r '.version' package.json)
          EXT_VERSION=$(jq -r '.version' apps/extension/package.json)
          SERVER_VERSION=$(grep '^version = ' apps/server/Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          echo "Root: $ROOT_VERSION, Extension: $EXT_VERSION, Server: $SERVER_VERSION"

          if [ "$ROOT_VERSION" != "$EXT_VERSION" ] || [ "$ROOT_VERSION" != "$SERVER_VERSION" ]; then
            echo "::error::Version mismatch! Root=$ROOT_VERSION, Extension=$EXT_VERSION, Server=$SERVER_VERSION. Run 'just bump <version>' to sync."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          VITE_COGNITO_AUTHORITY: ${{ secrets.VITE_COGNITO_AUTHORITY }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
